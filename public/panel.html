<!doctype html>
<html lang="tr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tanıtım ve Medya Paneli</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/assets/panel/styles.css" />
    </head>
    <body>
        <aside class="sidebar kapali" id="sidebar">
            <button
                type="button"
                class="sb-toggle"
                data-action-call="sidebarTogla()"
                title="Menüyü kapat"
                aria-label="Menüyü kapat"
            >
                <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                    <path
                        d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
                    />
                </svg>
            </button>
            <div class="sb-marka">
                <div class="ikon">
                    <img
                        src="/assets/logo.png"
                        alt="Logo"
                        style="width: 100%; height: 100%; object-fit: contain; border-radius: inherit"
                    />
                </div>
                <h1>Tanıtım ve Medya Paneli</h1>
            </div>
            <nav class="sb-nav">
                <button type="button" id="menu-harita" class="aktif" data-action-call="sayfaGoster('harita')">
                    <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                        <path
                            d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"
                        /></svg
                    ><span>Harita</span>
                </button>
                <button type="button" id="menu-iller" data-action-call="sayfaGoster('iller')">
                    <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                        <path
                            d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"
                        /></svg
                    ><span>İl / İlçe Yönetimi</span>
                </button>
                <button type="button" id="menu-gorevler" data-action-call="sayfaGoster('gorevler')">
                    <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                        <path
                            d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-2 14l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"
                        /></svg
                    ><span>Görevler</span>
                </button>
                <button type="button" id="menu-chat" data-action-call="sayfaGoster('chat')">
                    <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                        <path
                            d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"
                        /></svg
                    ><span>Sohbet</span>
                </button>
                <button type="button" id="menu-kullanicilar" data-action-call="sayfaGoster('kullanicilar')">
                    <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                        <path
                            d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
                        /></svg
                    ><span>Kullanıcı Yönetimi</span>
                </button>
                <button type="button" id="menu-profil" data-action-call="sayfaGoster('profil')">
                    <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                        <path
                            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                        /></svg
                    ><span>Profilim</span>
                </button>
                <button type="button" id="menu-notlar" data-action-call="sayfaGoster('notlar')">
                    <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                        <path
                            d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"
                        /></svg
                    ><span>Notlarım</span>
                </button>
            </nav>
            <div class="sb-alt">
                <button type="button" data-action-call="cikisYap()">
                    <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                        <path
                            d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"
                        /></svg
                    ><span>Çıkış Yap</span>
                </button>
            </div>
        </aside>
        <div class="main">
            <div class="sidebar-overlay" id="sidebar-overlay" data-action-call="sidebarTogla()"></div>

            <header class="topbar">
                <div style="display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1">
                    <button
                        type="button"
                        class="hamburger-btn"
                        data-action-call="sidebarTogla()"
                        title="Menü"
                        aria-label="Menüyü aç"
                    >
                        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
                        </svg>
                    </button>
                    <div class="sol" style="min-width: 0">
                        <h2>Tanıtım ve Medya Paneli</h2>
                        <p>Gençlik Kolları</p>
                    </div>
                </div>
                <div class="sag">
                    <div class="bildirim-wrap" id="bildirim-wrap">
                        <button
                            type="button"
                            class="bildirim-btn"
                            data-action-call="bildirimPanelTogla()"
                            title="Bildirimler"
                        >
                            <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                                <path
                                    d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"
                                />
                            </svg>
                            <span class="bildirim-rozet" id="bildirim-rozet" style="display: none">0</span>
                        </button>
                        <div class="bildirim-panel" id="bildirim-panel">
                            <div class="bildirim-baslik">
                                <h3>Bildirimler</h3>
                                <div style="display: flex; gap: 4px">
                                    <button
                                        type="button"
                                        data-action-call="bildirimleriTumOkundu()"
                                        class="bildirim-temizle-btn"
                                        title="Tümünü okundu yap"
                                    >
                                        ✓ Okundu
                                    </button>
                                    <button
                                        type="button"
                                        data-action-call="bildirimleriTumSil()"
                                        class="bildirim-temizle-btn"
                                        style="color: #c1121f"
                                        title="Tümünü sil"
                                    >
                                        🗑 Sil
                                    </button>
                                </div>
                            </div>
                            <div class="bildirim-liste" id="bildirim-liste">
                                <p class="bildirim-bos">Henüz bildirim yok.</p>
                            </div>
                        </div>
                    </div>
                    <div class="profil-chip" data-action-call="sayfaGoster('profil')">
                        <div class="ad">
                            <p id="tb-ad">-</p>
                            <p id="tb-gorev">-</p>
                        </div>
                        <div class="avatar" id="tb-avatar">?</div>
                    </div>
                </div>
            </header>
            <div class="icerik" id="panel-pages-root"></div>
        </div>
        <div id="panel-floating-root"></div>
        <div id="panel-modals-root"></div>
        <script type="module" src="/assets/panel/main.js"></script>
    </body>
</html>
