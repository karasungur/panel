<!doctype html>
<html lang="tr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Giriş — Tanıtım ve Medya Paneli</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --primary: #e35c00; /* AK Parti Turuncusu */
                --primary-hover: #c24e00;
                --primary-container: rgba(227, 92, 0, 0.08);
                --on-primary: #fff;
                --bg: #f8fafc;
                --surface: #fff;
                --surface-low: #f1f5f9;
                --surface-container: #e2e8f0;
                --on-surface: #0f172a;
                --secondary: #475569;
                --outline: #94a3b8;
                --outline-variant: #cbd5e1;
                --error: #dc2626;
                --error-container: #fee2e2;
                --success: #16a34a;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: 'Inter', sans-serif;
                background: var(--bg);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 16px;
                background-image:
                    radial-gradient(at 0% 0%, rgba(227, 92, 0, 0.07) 0, transparent 50%),
                    radial-gradient(at 100% 100%, rgba(15, 23, 42, 0.05) 0, transparent 50%);
            }
            .kart {
                width: 100%;
                max-width: 430px;
            }
            .marka {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-bottom: 28px;
            }
            .logo {
                width: 64px;
                height: 64px;
                background: var(--primary);
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 16px;
                box-shadow: 0 8px 24px rgba(227, 92, 0, 0.2);
                transition: transform 0.3s ease;
            }
            .logo:hover {
                transform: scale(1.05);
            }
            .logo svg {
                width: 34px;
                height: 34px;
                fill: #fff;
            }
            .marka h1 {
                font-size: 24px;
                color: var(--on-surface);
                font-weight: 800;
                letter-spacing: -0.5px;
                text-align: center;
            }
            .marka p {
                font-size: 14px;
                color: var(--secondary);
                margin-top: 4px;
                font-weight: 500;
            }
            .form-kart {
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(24px);
                border: 1px solid rgba(255, 255, 255, 0.7);
                box-shadow:
                    0 4px 6px -1px rgba(0, 0, 0, 0.05),
                    0 20px 40px -2px rgba(227, 92, 0, 0.05),
                    0 1px 1px 0 rgba(255, 255, 255, 0.8) inset;
                border-radius: 20px;
                padding: 36px;
                transition:
                    transform 0.3s ease,
                    box-shadow 0.3s ease;
            }
            .form-kart:hover {
                box-shadow:
                    0 10px 15px -3px rgba(0, 0, 0, 0.05),
                    0 25px 50px -12px rgba(227, 92, 0, 0.08),
                    0 1px 1px 0 rgba(255, 255, 255, 0.8) inset;
            }
            .form-kart.shake {
                animation: shake 0.4s ease-in-out;
            }
            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                20%,
                60% {
                    transform: translateX(-6px);
                }
                40%,
                80% {
                    transform: translateX(6px);
                }
            }
            .alan {
                margin-bottom: 20px;
            }
            label {
                display: block;
                font-size: 12px;
                font-weight: 600;
                color: var(--secondary);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 8px;
            }
            .input-sar {
                position: relative;
            }
            .input-sar svg {
                position: absolute;
                left: 12px;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                height: 20px;
                fill: var(--outline);
                transition: fill 0.15s;
                pointer-events: none;
            }
            .input-sar:focus-within svg {
                fill: var(--primary);
            }
            .telefon-prefix {
                position: absolute;
                left: 42px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--on-surface);
                font-size: 14px;
                font-weight: 700;
                pointer-events: none;
            }
            input {
                width: 100%;
                background: var(--surface-low);
                border: 1px solid var(--outline-variant);
                border-radius: 10px;
                padding: 13px 14px 13px 42px;
                font-size: 14px;
                color: var(--on-surface);
                font-family: inherit;
                transition: all 0.2s ease;
            }
            .telefon-sar input {
                padding-left: 82px;
            }
            input:focus {
                outline: none;
                border-color: var(--primary);
                background: var(--surface);
                box-shadow: 0 0 0 3px var(--primary-container);
            }
            input.invalid,
            input.invalid:focus {
                border-color: var(--error);
                box-shadow: 0 0 0 3px var(--error-container);
            }
            .password-sar input {
                padding-right: 44px;
            }
            .sifre-toggle {
                position: absolute;
                right: 12px;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                cursor: pointer;
                padding: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--outline);
                transition: color 0.15s;
            }
            .sifre-toggle:hover {
                color: var(--primary);
            }
            .sifre-toggle svg {
                width: 20px;
                height: 20px;
                fill: currentColor;
                position: static;
                transform: none;
                pointer-events: auto;
            }
            .giris-btn {
                width: 100%;
                background: var(--primary);
                color: #fff;
                border: none;
                border-radius: 10px;
                padding: 14px;
                font-size: 16px;
                font-weight: 600;
                font-family: inherit;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                transition: all 0.2s ease;
                margin-top: 6px;
            }
            .giris-btn:hover {
                background: var(--primary-hover);
                transform: translateY(-1px);
                box-shadow: 0 4px 12px rgba(227, 92, 0, 0.2);
            }
            .giris-btn:active {
                transform: translateY(0);
            }
            .giris-btn:disabled {
                opacity: 0.7;
                cursor: not-allowed;
                transform: none;
                box-shadow: none;
            }
            .spinner {
                display: none;
                width: 20px;
                height: 20px;
                border: 2px solid rgba(255, 255, 255, 0.3);
                border-radius: 50%;
                border-top-color: #fff;
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .giris-btn.loading .spinner {
                display: block;
            }
            .giris-btn.loading span,
            .giris-btn.loading svg:not(.spinner) {
                display: none;
            }
            .hata {
                display: none;
                background: var(--error-container);
                color: #93000a;
                padding: 11px;
                border-radius: 8px;
                font-size: 13px;
                margin-top: 16px;
                text-align: center;
                border: 1px solid rgba(220, 38, 38, 0.2);
                animation: slideDown 0.2s ease-out;
            }
            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateY(-8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .alt-uyari {
                margin-top: 24px;
                text-align: center;
            }
            .alt-uyari .rozet {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: rgba(220, 38, 38, 0.06);
                border: 1px solid rgba(220, 38, 38, 0.12);
                color: #b91c1c;
                padding: 7px 14px;
                border-radius: 99px;
                font-size: 12px;
                font-weight: 500;
            }
            .telif {
                margin-top: 14px;
                font-size: 12px;
                color: var(--outline);
            }
            @media (max-width: 480px) {
                .form-kart {
                    padding: 24px;
                    border-radius: 16px;
                }
                .marka h1 {
                    font-size: 20px;
                }
                body {
                    padding: 12px;
                }
            }
        </style>
    </head>
    <body>
        <div class="kart">
            <div class="marka">
                <div class="logo">
                    <img
                        src="/assets/logo.png"
                        alt="Logo"
                        style="width: 100%; height: 100%; object-fit: contain; border-radius: inherit"
                    />
                </div>
                <h1>Tanıtım ve Medya Paneli</h1>
                <p>Gençlik Kolları</p>
            </div>
            <form class="form-kart" id="login-form" novalidate>
                <div class="alan">
                    <label for="telefon">Telefon</label>
                    <div class="input-sar telefon-sar">
                        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                            <path
                                d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.61 21 3 13.39 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"
                            />
                        </svg>
                        <span class="telefon-prefix">+90</span>
                        <input
                            type="tel"
                            id="telefon"
                            placeholder="5xxxxxxxxx"
                            autocomplete="tel-national"
                            inputmode="numeric"
                            maxlength="10"
                            required
                            aria-describedby="hata-mesaji"
                        />
                    </div>
                </div>
                <div class="alan">
                    <label for="sifre">Şifre</label>
                    <div class="input-sar password-sar">
                        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                            <path
                                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"
                            />
                        </svg>
                        <input
                            type="password"
                            id="sifre"
                            placeholder="Şifreniz"
                            autocomplete="current-password"
                            required
                            aria-describedby="hata-mesaji"
                        />
                        <button type="button" class="sifre-toggle" id="sifre-toggle" aria-label="Şifreyi göster">
                            <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                                <path
                                    d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
                                />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="giris-btn" id="giris-btn">
                    <span class="spinner" aria-hidden="true"></span>
                    <span>Giriş Yap</span>
                    <svg
                        aria-hidden="true"
                        focusable="false"
                        viewBox="0 0 24 24"
                        style="width: 20px; height: 20px; fill: #fff"
                    >
                        <path
                            d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"
                        />
                    </svg>
                </button>
                <div class="hata" id="hata-mesaji" role="alert"></div>
            </form>
            <div class="alt-uyari">
                <span class="rozet">
                    <svg
                        aria-hidden="true"
                        focusable="false"
                        viewBox="0 0 24 24"
                        style="width: 16px; height: 16px; fill: currentColor"
                    >
                        <path
                            d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11V11.99z"
                        />
                    </svg>
                    Yetkisiz girişler engellenmektedir.
                </span>
                <p class="telif">© 2026 Tanıtım ve Medya Paneli</p>
            </div>
        </div>
        <script type="module" src="/assets/login.js"></script>
    </body>
</html>
